api changes:
  - changed-files:
      - any-glob-to-any-file:
          - apps/*/src/**
          - apps/*/src/*
          - packages/*/src/**
          - packages/*/src/*
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - packages/*/package.json
          - apps/*/package.json
          - pnpm-lock.yaml
          - pnpm-workspace.yaml
tests:
  - changed-files:
      - any-glob-to-any-file:
          - apps/*/tests/*
          - apps/*/tests/**/*
          - packages/*/tests/*
          - packages/*/tests/**/*
docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/*
          - docs/**/*
          - '**/*.md'
infra:
  - changed-files:
      - any-glob-to-any-file:
          - .github/*
          - .github/**/*
ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/*
          - .github/workflows/**/*
typings:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.d.ts'
          - apps/*/src/**/*.ts
          - packages/*/src/**/*.ts
build:
  - changed-files:
      - any-glob-to-any-file:
          - tsconfig*.json
          - apps/*/tsconfig*.json
          - packages/*/tsconfig*.json
          - next.config.*
          - apps/*/next.config.*
          - eslint.config.js
          - prettier.config.js
          - .prettierignore
          - .editorconfig
          - .gitignore
          - .gitattributes
          - .commitlintrc.ts
chore:
  - changed-files:
      - any-glob-to-any-file:
          - .npmignore
          - LICENSE
          - .github/CODE_OF_CONDUCT.md
          - .github/ISSUE_TEMPLATE/*
          - .github/ISSUE_TEMPLATE/**/*
